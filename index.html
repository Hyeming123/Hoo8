<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Manager : 11 Player League</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --panel: rgba(18, 24, 36, 0.9);
            --primary: #d4af37;
            --accent: #00e5ff;
            --text: #f1f5f9;
            --win: #10b981;
            --loss: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #0a0e17;
            border-bottom: 2px solid var(--primary);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .screen {
            display: none;
            flex: 1;
            padding: 30px;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .card {
            background: var(--panel);
            border: 1px solid #232e42;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-align: center;
            margin-bottom: 25px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        input {
            width: 100%;
            background: #0f172a;
            color: #fff;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .player-list {
            width: 100%;
            margin: 20px 0;
        }

        .player-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            width: 100%;
            flex: 1;
        }

        .panel {
            background: var(--panel);
            border: 1px solid #232e42;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .my-team {
            color: var(--accent);
            font-weight: bold;
        }

        #log {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">ESPORTS MANAGER</div>
        <div id="header-stats" style="display:none; gap:20px;">
            <span>WEEK: <span id="st-week">1</span></span>
            <span>MONEY: <span id="st-money">1500</span>G</span>
        </div>
    </header>

    <!-- LOBBY -->
    <div id="screen-lobby" class="screen active">
        <div class="card">
            <h2>MULTIPLAYER LEAGUE</h2>
            <input type="text" id="inp-team" placeholder="TEAM NAME">
            <button class="btn btn-primary" onclick="createRoom()">CREATE LEAGUE</button>
            <div style="margin: 20px 0; text-align: center; color: #64748b;">OR</div>
            <input type="text" id="inp-room" placeholder="ROOM CODE">
            <button class="btn btn-secondary" onclick="joinRoom()">JOIN LEAGUE</button>
        </div>
    </div>

    <!-- WAITING ROOM -->
    <div id="screen-waiting" class="screen">
        <div class="card">
            <h2>WAITING ROOM</h2>
            <div style="font-size: 14px; color: #94a3b8; text-align: center;">ROOM CODE</div>
            <div id="room-code"
                style="font-family: 'Orbitron'; font-size: 40px; color: var(--primary); text-align: center; margin: 10px 0; letter-spacing: 5px;">
                ------</div>
            <div class="player-list" id="player-list"></div>
            <button id="start-btn" class="btn btn-primary" style="display:none;" onclick="startGame()">START
                SEASON</button>
            <div id="wait-msg" style="text-align:center; color: var(--accent);">Waiting for more players (Max 11)...
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div class="grid">
            <div class="panel">
                <h3 style="font-family: 'Orbitron'; color: var(--primary);">ROSTER</h3>
                <div id="roster-list"></div>
            </div>
            <div class="panel">
                <h3 style="font-family: 'Orbitron'; color: var(--primary); text-align:center;">MATCH CENTER</h3>
                <div id="log"></div>
                <div id="planner" style="margin-top: 20px;">
                    <div id="week-plan-ui"></div>
                    <button id="submit-plan" class="btn btn-primary" onclick="submitPlan()">SUBMIT WEEKLY PLAN</button>
                </div>
            </div>
            <div class="panel">
                <h3 style="font-family: 'Orbitron'; color: var(--primary);">STANDINGS</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>TEAM</th>
                            <th>W</th>
                            <th>L</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let myTeam, myIndex, currentWeek = 1;
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;

        function connect() {
            ws = new WebSocket(`${protocol}//${host}`);
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                console.log("RECV:", msg);
                switch (msg.type) {
                    case 'ROOM_CREATED':
                    case 'ROOM_JOINED':
                        myTeam = msg.team; myIndex = msg.playerIndex;
                        document.getElementById('room-code').textContent = msg.roomId;
                        showScreen('waiting');
                        if (myIndex === 0) document.getElementById('start-btn').style.display = 'block';
                        break;
                    case 'PLAYER_JOINED':
                        updatePlayerList(msg.teams);
                        break;
                    case 'GAME_START':
                        showScreen('game');
                        document.getElementById('header-stats').style.display = 'flex';
                        renderRoster();
                        renderPlanner();
                        addLog("시즌이 시작되었습니다!");
                        break;
                    case 'MATCH_RESULT':
                        addLog(`[WEEK ${msg.week}] ${msg.home} vs ${msg.away} -> ${msg.winner} 승리!`);
                        break;
                    case 'WEEK_START':
                        currentWeek = msg.week;
                        document.getElementById('st-week').textContent = currentWeek;
                        updateStandings(msg.teams);
                        document.getElementById('submit-plan').disabled = false;
                        document.getElementById('submit-plan').textContent = "SUBMIT WEEKLY PLAN";
                        addLog(`--- WEEK ${currentWeek} 시작 ---`);
                        break;
                    case 'SEASON_END':
                        alert(`시즌 종료! 우승팀: ${msg.winner}`);
                        location.reload();
                        break;
                }
            };
        }

        function createRoom() {
            const teamName = document.getElementById('inp-team').value;
            if (!teamName) return alert("팀명을 입력하세요.");
            ws.send(JSON.stringify({ type: 'CREATE_ROOM', teamName }));
        }

        function joinRoom() {
            const roomId = document.getElementById('inp-room').value;
            const teamName = document.getElementById('inp-team').value;
            if (!roomId || !teamName) return alert("방 코드와 팀명을 입력하세요.");
            ws.send(JSON.stringify({ type: 'JOIN_ROOM', roomId, teamName }));
        }

        function startGame() {
            ws.send(JSON.stringify({ type: 'START_GAME' }));
        }

        function submitPlan() {
            const actions = [];
            for (let i = 1; i <= 5; i++) actions.push(document.getElementById(`plan-${i}`).value);
            ws.send(JSON.stringify({ type: 'PLAYER_ACTION', actions }));
            document.getElementById('submit-plan').disabled = true;
            document.getElementById('submit-plan').textContent = "WAITING FOR OTHERS...";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
        }

        function updatePlayerList(teams) {
            const list = document.getElementById('player-list');
            list.innerHTML = teams.map((t, i) => `<div class="player-item"><span>${i + 1}. ${t}</span> ${i === 0 ? '<span style="color:var(--primary)">HOST</span>' : ''}</div>`).join('');
        }

        function renderRoster() {
            const list = document.getElementById('roster-list');
            list.innerHTML = myTeam.roster.map(p => `<div class="player-item"><span>${p.pos}</span> <span>${p.name}</span> <span>Tier ${Math.floor(p.ovr / 10)}</span></div>`).join('');
        }

        function renderPlanner() {
            let html = "";
            for (let i = 1; i <= 5; i++) {
                html += `<div style="margin-bottom:10px;">DAY ${i}: <select id="plan-${i}" style="background:#0f172a; color:#fff; border:1px solid #334155; padding:5px; border-radius:4px; width:100%;">
                    <option value="train">개인훈련 (기량↑, 피로+10)</option>
                    <option value="rest">휴식 (피로-20)</option>
                    <option value="stream">스트리밍 (+200G, 피로+15)</option>
                    <option value="scrim">스크림 (-50G, 기량↑↑, 피로+25)</option>
                </select></div>`;
            }
            document.getElementById('week-plan-ui').innerHTML = html;
        }

        function updateStandings(teams) {
            const body = document.getElementById('standings-body');
            const sorted = [...teams].sort((a, b) => b.w - a.w);
            body.innerHTML = sorted.map((t, i) => `<tr class="${t.name === myTeam.name ? 'my-team' : ''}"><td>${i + 1}</td><td>${t.name}</td><td>${t.w}</td><td>${t.l}</td></tr>`).join('');

            const me = teams.find(t => t.name === myTeam.name);
            if (me) {
                document.getElementById('st-money').textContent = me.money.toLocaleString();
            }
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        connect();
    </script>
</body>

</html>
